<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Pro | Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="app-body">
    <div class="tasks-shell">
      <header class="simple-topbar glass-dark">
        <div class="brand">
          <i class="fa-solid fa-layer-group"></i>
          <span>TaskFlow Pro</span>
        </div>

        <nav class="simple-nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="tasks.html">Tasks</a>
          <a href="calendar.html">Calendar</a>
          <a href="analytics.html" class="active">Analytics</a>
          <a href="settings.html">Settings</a>
        </nav>
      </header>

      <main class="container page-main">
        <section class="page-header compact">
          <div>
            <p class="eyebrow">Reports and Insights</p>
            <h1>Analytics</h1>
          </div>
        </section>

        <section class="analytics-stats">
          <div class="stat-card glass-light">
            <div class="stat-icon">
              <i class="fa-solid fa-chart-column"></i>
            </div>
            <div>
              <p>Completion Rate</p>
              <h2>94%</h2>
            </div>
          </div>

          <div class="stat-card glass-light">
            <div class="stat-icon">
              <i class="fa-solid fa-hourglass-half"></i>
            </div>
            <div>
              <p>Avg. Task Time</p>
              <h2>3.2d</h2>
            </div>
          </div>

          <div class="stat-card glass-light">
            <div class="stat-icon"><i class="fa-solid fa-user-group"></i></div>
            <div>
              <p>Team Efficiency</p>
              <h2>88%</h2>
            </div>
          </div>
        </section>

        <section class="analytics-grid">
          <div class="chart-card glass-light">
            <div class="card-title">
              <i class="fa-solid fa-chart-line"></i>
              <h3>Task Completion Trend</h3>
            </div>

            <div class="fake-chart line-chart">
              <div class="line-bars">
                <span style="height: 35%"></span>
                <span style="height: 50%"></span>
                <span style="height: 60%"></span>
                <span style="height: 45%"></span>
                <span style="height: 75%"></span>
                <span style="height: 90%"></span>
                <span style="height: 80%"></span>
              </div>
            </div>
          </div>

          <div class="chart-card glass-light">
            <div class="card-title">
              <i class="fa-solid fa-chart-pie"></i>
              <h3>Priority Distribution</h3>
            </div>

            <div class="fake-pie-wrapper">
              <div class="fake-pie"></div>
              <div class="pie-legend">
                <div><span class="legend-dot red"></span> High</div>
                <div><span class="legend-dot yellow"></span> Medium</div>
                <div><span class="legend-dot green"></span> Low</div>
              </div>
            </div>
          </div>

          <div class="chart-card glass-light wide-card">
            <div class="card-title">
              <i class="fa-solid fa-chart-bar"></i>
              <h3>Team Productivity</h3>
            </div>

            <div class="bar-chart">
              <div class="bar-item">
                <span>Aisha</span>
                <div class="bar"><div style="width: 88%"></div></div>
              </div>
              <div class="bar-item">
                <span>Brian</span>
                <div class="bar"><div style="width: 72%"></div></div>
              </div>
              <div class="bar-item">
                <span>Tina</span>
                <div class="bar"><div style="width: 91%"></div></div>
              </div>
              <div class="bar-item">
                <span>Sam</span>
                <div class="bar"><div style="width: 65%"></div></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
