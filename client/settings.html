<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Pro | Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="app-body">
    <div class="tasks-shell">
      <header class="simple-topbar glass-dark">
        <div class="brand">
          <i class="fa-solid fa-layer-group"></i>
          <span>TaskFlow Pro</span>
        </div>

        <nav class="simple-nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="tasks.html">Tasks</a>
          <a href="calendar.html">Calendar</a>
          <a href="analytics.html">Analytics</a>
          <a href="settings.html" class="active">Settings</a>
        </nav>
      </header>

      <main class="container page-main">
        <section class="page-header compact">
          <div>
            <p class="eyebrow">Workspace Preferences</p>
            <h1>Settings</h1>
          </div>
        </section>

        <section class="settings-grid">
          <div class="settings-card glass-light">
            <div class="card-title">
              <i class="fa-solid fa-building"></i>
              <h3>Workspace Settings</h3>
            </div>

            <div class="form-group">
              <label for="workspaceName">Workspace Name</label>
              <input type="text" id="workspaceName" value="Product Team" />
            </div>

            <div class="form-group">
              <label for="workspaceTheme">Theme</label>
              <select id="workspaceTheme">
                <option>Blue Gradient</option>
                <option>Dark Mode</option>
                <option>Light Mode</option>
              </select>
            </div>

            <button class="btn btn-primary">Save Workspace</button>
          </div>

          <div class="settings-card glass-light">
            <div class="card-title">
              <i class="fa-solid fa-bell"></i>
              <h3>Notifications</h3>
            </div>

            <div class="setting-row">
              <div>
                <strong>Email Notifications</strong>
                <p>Receive task updates by email</p>
              </div>
              <label class="switch">
                <input type="checkbox" checked />
                <span class="slider"></span>
              </label>
            </div>

            <div class="setting-row">
              <div>
                <strong>Deadline Alerts</strong>
                <p>Get reminded before task deadlines</p>
              </div>
              <label class="switch">
                <input type="checkbox" checked />
                <span class="slider"></span>
              </label>
            </div>

            <div class="setting-row">
              <div>
                <strong>Team Activity</strong>
                <p>See teammate updates in real time</p>
              </div>
              <label class="switch">
                <input type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="settings-card glass-light">
            <div class="card-title">
              <i class="fa-solid fa-user-gear"></i>
              <h3>Account</h3>
            </div>

            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" value="Samantha Simpson" />
            </div>

            <div class="form-group">
              <label for="emailAddress">Email Address</label>
              <input
                type="email"
                id="emailAddress"
                value="samantha@example.com"
              />
            </div>

            <button class="btn btn-secondary">Update Profile</button>
          </div>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
